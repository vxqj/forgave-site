<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>factor | TikTok</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        /* ===== TIKTOK PROFILE CARD ===== */
        .profile-card {
            max-width: 400px;
            width: 100%;
            background: #121212;
            border-radius: 16px;
            padding: 24px 20px 20px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s;
        }

        .profile-card:hover {
            transform: translateY(-2px);
        }

        /* ===== HEADER ===== */
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .profile-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .profile-username {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .profile-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }

        .badge-icon {
            width: 18px;
            height: 18px;
            background: #25F4EE;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #000;
        }

        .badge-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.3px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            background: #2a2a2a;
        }

        /* ===== BIO ===== */
        .profile-bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 16px;
            padding: 0 2px;
            min-height: 20px;
        }

        /* ===== STATS ===== */
        .profile-stats {
            display: flex;
            gap: 28px;
            margin-bottom: 20px;
            padding: 0 2px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-number {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.2px;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: lowercase;
            margin-top: 1px;
        }

        /* ===== FOLLOW BUTTON ===== */
        .follow-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-decoration: none;
            font-family: inherit;
        }

        .follow-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .follow-btn:active {
            transform: scale(0.97);
        }

        .follow-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
            flex-shrink: 0;
        }

        /* ===== LIVE INDICATOR ===== */
        .live-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.3px;
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #25F4EE;
            animation: livePulse 1.6s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .profile-card {
                padding: 18px 14px 16px;
            }

            .profile-name {
                font-size: 19px;
            }

            .profile-avatar {
                width: 64px;
                height: 64px;
            }

            .stat-number {
                font-size: 15px;
            }

            .stat-label {
                font-size: 11px;
            }

            .follow-btn {
                font-size: 14px;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>

    <div class="profile-card">

        <!-- ===== HEADER ===== -->
        <div class="profile-header">
            <div class="profile-left">
                <div class="profile-name" id="display-name">factor</div>
                <div class="profile-username" id="username">@factor</div>
                <div class="profile-badge">
                    <span class="badge-icon">✓</span>
                    <span class="badge-text">TikTok</span>
                </div>
            </div>
            <img class="profile-avatar" id="avatar" src="https://files.catbox.moe/upime5.jpeg" alt="Avatar" />
        </div>

        <!-- ===== BIO ===== -->
        <div class="profile-bio" id="bio">content creator • forgave.lol</div>

        <!-- ===== STATS ===== -->
        <div class="profile-stats">
            <div class="stat-item">
                <span class="stat-number" id="stat-following">39</span>
                <span class="stat-label">Following</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-followers">76</span>
                <span class="stat-label">Followers</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="stat-likes">325</span>
                <span class="stat-label">Likes</span>
            </div>
        </div>

        <!-- ===== FOLLOW BUTTON ===== -->
        <a class="follow-btn" href="https://tiktok.com/@factor" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg>
            Follow on TikTok
        </a>

        <!-- ===== LIVE INDICATOR ===== -->
        <div class="live-indicator">
            <span class="live-dot"></span>
            <span id="live-status">Live • updated just now</span>
        </div>

    </div>

    <script>
        // ============================================================
        //  🎯 CONFIG – EDIT THIS SECTION
        // ============================================================
        const CONFIG = {
            // ===== PROFILE INFO =====
            displayName: 'factor',
            username: 'factor',
            // 👇 Your avatar URL is already set to the image you provided
            avatar: 'https://files.catbox.moe/upime5.jpeg',
            bio: 'content creator • forgave.lol',

            // ===== STATS (these update automatically) =====
            following: 39,
            followers: 76,
            likes: 325
        };

        // ============================================================
        //  DO NOT EDIT BELOW THIS LINE
        // ============================================================

        // Set profile data
        document.getElementById('display-name').textContent = CONFIG.displayName;
        document.getElementById('username').textContent = '@' + CONFIG.username;
        document.getElementById('bio').textContent = CONFIG.bio;

        // Avatar
        const avatarEl = document.getElementById('avatar');
        if (CONFIG.avatar) {
            avatarEl.src = CONFIG.avatar;
            avatarEl.onerror = function() {
                this.style.display = 'none';
            };
        } else {
            avatarEl.style.display = 'none';
        }

        // Stats
        document.getElementById('stat-following').textContent = CONFIG.following;
        document.getElementById('stat-followers').textContent = CONFIG.followers;
        document.getElementById('stat-likes').textContent = CONFIG.likes;

        // Live status update
        const liveStatus = document.getElementById('live-status');
        liveStatus.textContent = 'Live • ' + new Date().toLocaleTimeString();

        // Update every 30 seconds (just the time)
        setInterval(() => {
            liveStatus.textContent = 'Live • ' + new Date().toLocaleTimeString();
        }, 30000);

        console.log('🎬 TikTok profile loaded with config:', CONFIG);
    </script>

</body>
</html>

  C.links.forEach(lk => {

  const typeText = C.siteName;

    if (!deleting) {
      nameEl.textContent = typeText.slice(0, ++ti);
      if (ti === typeText.length) { deleting = true; setTimeout(typeStep, 2000); }
      else setTimeout(typeStep, 90);
    } else {
      nameEl.textContent = typeText.slice(0, --ti);
      if (ti === 0) { deleting = false; setTimeout(typeStep, 500); }
      else setTimeout(typeStep, 55);

    setTimeout(() => overlay.remove(), 700);
    if (hasVideo) bgvideo.play().catch(() => {});
    if (C.music && C.music.url) {
      audio.src = C.music.url; audio.volume = C.music.volume;
      audio.play().catch(() => {});
    }
  });

  // falling words
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", () => { resize(); initWords(); });
  const words = [];
  function randWord() { return C.bgWords[Math.floor(Math.random() * C.bgWords.length)]; }
  function makeWord(top) {
    const depth = Math.random();
    const size  = C.wordSize[0] + depth * (C.wordSize[1] - C.wordSize[0]);
    const speed = C.wordSpeed[0] + depth * (C.wordSpeed[1] - C.wordSpeed[0]);
    return {
      text: randWord(), x: Math.random() * canvas.width,
      y: top ? -(size * 2 + Math.random() * 80) : Math.random() * canvas.height,
      size, speed, depth,
      rot: (Math.random() - .5) * Math.PI * 2,
      rotSpeed: (Math.random() > .5 ? 1 : -1) * (0.002 + Math.random() * C.wordSpin),
      drift: (Math.random() - .5) * 0.15,
      opacity: 0.03 + depth * 0.20,
    };
  }
  function initWords() { words.length = 0; for (let i = 0; i < C.wordCount; i++) words.push(makeWord(false)); }
  initWords();
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const w of words) {
      ctx.save();
      ctx.translate(w.x, w.y); ctx.rotate(w.rot);
      ctx.font = `300 ${w.size}px "DM Mono","Courier New",monospace`;
      ctx.fillStyle = C.wordColor + w.opacity + ")";
      ctx.fillText(w.text, 0, 0);
      ctx.restore();
      w.y += w.speed; w.x += w.drift; w.rot += w.rotSpeed;
      if (w.y > canvas.height + w.size * 3) { Object.assign(w, makeWord(true)); w.x = Math.random() * canvas.width; }
    }
    requestAnimationFrame(draw);
  }
  draw();

  // cursor trail
  const trail = document.getElementById("trail");
  const tCtx  = trail.getContext("2d");
  trail.width  = window.innerWidth; trail.height = window.innerHeight;
  window.addEventListener("resize", () => { trail.width = window.innerWidth; trail.height = window.innerHeight; });
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  const ghosts = [
    { x: mx, y: my, lag: 0.18, alpha: 0.22, scale: 0.95 },
    { x: mx, y: my, lag: 0.10, alpha: 0.13, scale: 0.90 },
    { x: mx, y: my, lag: 0.06, alpha: 0.07, scale: 0.85 },
  ];
  window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
  function drawArrow(x, y, alpha, scale) {
    tCtx.save(); tCtx.translate(x, y); tCtx.scale(scale, scale);
    tCtx.beginPath();
    tCtx.moveTo(0,0); tCtx.lineTo(0,16); tCtx.lineTo(3.5,12.5);
    tCtx.lineTo(6,18); tCtx.lineTo(8,17); tCtx.lineTo(5.5,11.5);
    tCtx.lineTo(10,11.5); tCtx.closePath();
    tCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    tCtx.fill();
    tCtx.strokeStyle = `rgba(0,0,0,${alpha * 0.5})`;
    tCtx.lineWidth = 0.8; tCtx.stroke(); tCtx.restore();
  }
  function drawTrail() {
    tCtx.clearRect(0, 0, trail.width, trail.height);
    for (const g of ghosts) {
      g.x += (mx - g.x) * g.lag; g.y += (my - g.y) * g.lag;
      drawArrow(g.x, g.y, g.alpha, g.scale);
    }
    requestAnimationFrame(drawTrail);
  }
  drawTrail();

  // likes
  const SUPA_URL = "https://xqqwyugfyntgbgohzqcz.supabase.co";
  const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxcXd5dWdmeW50Z2Jnb2h6cWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjI1NTQsImV4cCI6MjA5NTE5ODU1NH0.Y-Z5HawSgxraigCep2BHINLvev98b3m3BGsI1DT_LQY";
  const likeBtn = document.getElementById("like-btn");
  const likeNum = document.getElementById("like-num");
  const likeKey = "liked_" + likeId.replace(/\//g, "_");
  let hasLiked = localStorage.getItem(likeKey) === "1";
  if (hasLiked) likeBtn.classList.add("liked");

  async function fetchLikes() {
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/likes?id=eq.${encodeURIComponent(likeId)}&select=count`, {
        headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }
      });
      const data = await res.json();
      if (!data[0]) {
        // row doesn't exist yet, insert it
        await fetch(`${SUPA_URL}/rest/v1/likes`, {
          method: "POST",
          headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ id: likeId, count: 0 })
        });
        likeNum.textContent = 0;
      } else {
        likeNum.textContent = data[0].count;
      }
    } catch { likeNum.textContent = "?"; }
  }

  async function updateLike(delta) {
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/likes?id=eq.${encodeURIComponent(likeId)}&select=count`, {
        headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }
      });
      const data = await res.json();
      const newCount = Math.max(0, (data[0]?.count ?? 0) + delta);
      await fetch(`${SUPA_URL}/rest/v1/likes?id=eq.${encodeURIComponent(likeId)}`, {
        method: "PATCH",
        headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ count: newCount })
      });
      likeNum.textContent = newCount;
    } catch {}
  }

  likeBtn.addEventListener("click", () => {
    if (!hasLiked) {
      hasLiked = true;
      localStorage.setItem(likeKey, "1");
      likeBtn.classList.add("liked");
      updateLike(1);
    } else {
      hasLiked = false;
      localStorage.removeItem(likeKey);
      likeBtn.classList.remove("liked");
      updateLike(-1);
    }
  });

  fetchLikes();
}
</script>

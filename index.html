<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>forgave.lol</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;font-family:"Inter",sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .container{max-width:1024px;width:100%;text-align:center}
        .glow{position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(255,255,255,0.04)0%,transparent 70%);pointer-events:none;z-index:0}
        .header{display:flex;justify-content:space-between;padding:20px 0 60px;position:relative;z-index:1}
        .logo{font-size:1.2rem;font-weight:600;font-family:"DM Mono",monospace}
        .signin{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:8px 20px;border-radius:40px;cursor:pointer}
        .hero{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
        .hero h1{font-size:clamp(2.8rem,8vw,4.8rem);font-weight:700;letter-spacing:-2px;line-height:1.1;margin-bottom:8px}
        .sub{font-size:1.1rem;color:rgba(255,255,255,0.5);margin-bottom:20px}
        .desc{font-size:1.05rem;color:rgba(255,255,255,0.4);max-width:560px;line-height:1.7;margin-bottom:40px}
        .cta{display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:60px;padding:4px 4px 4px 18px;max-width:500px;width:100%;margin:0 auto}
        .cta:focus-within{border-color:rgba(255,255,255,0.3)}
        .prefix{font-size:.95rem;color:rgba(255,255,255,0.35);font-family:"DM Mono",monospace;white-space:nowrap}
        .cta input{flex:1;background:transparent;border:none;padding:14px 12px;font-size:.95rem;color:#fff;outline:none;font-family:"DM Mono",monospace}
        .cta input::placeholder{color:rgba(255,255,255,0.2)}
        .claim{background:#fff;border:none;color:#0a0a0a;padding:10px 28px;border-radius:60px;font-weight:600;font-size:.95rem;cursor:pointer;transition:all .2s;white-space:nowrap}
        .claim:hover{background:rgba(255,255,255,0.85);transform:scale(.98)}
        .badge{margin-top:24px;font-size:.8rem;color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05);padding:4px 16px;border-radius:40px;border:1px solid rgba(255,255,255,0.06)}
        @media(max-width:600px){.cta{flex-wrap:wrap;background:transparent;border:none;padding:0;gap:10px;border-radius:0}.cta input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:60px;padding:14px 18px;width:100%}.claim{width:100%;justify-content:center;padding:14px}.prefix{display:none}}
    </style>
</head>
<body>
<div style="position:relative;width:100%;max-width:1024px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center">
    <div class="glow"></div>
    <header class="header">
        <span class="logo">forgave.lol</span>
        <button class="signin" onclick="alert('Sign In modal would open')">Sign In</button>
    </header>
    <main class="hero">
        <h1>One link for everything you are</h1>
        <p class="sub">Your Link, Your Style</p>
        <p class="desc">Build a stunning bio page with custom themes, music, particle effects, and social links — all in one place.</p>
        <div class="cta">
            <span class="prefix">forgave.lol/</span>
            <input type="text" placeholder="yourname" maxlength="24">
            <button class="claim" onclick="alert('Username: '+this.previousElementSibling.value)">Claim</button>
        </div>
        <span class="badge">Free forever — No credit card required</span>
    </main>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>forgave.lol — glass</title>
<meta property="og:title" content="forgave.lol"/>
<meta property="og:description" content="forgave.lol // glass"/>
<meta property="og:image" content="https://files.catbox.moe/fjrfis.png"/>
<meta property="og:url" content="https://forgave.lol"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://files.catbox.moe/fjrfis.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"/>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #0c0c12 0%, #030307 100%);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: #f0f0f5;
  overflow-x: hidden;
}

/* animated glass gradient bg */
.glass-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(ellipse at 40% 50%, rgba(30, 30, 55, 0.4), transparent 70%);
}

.glass-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 20%, rgba(120, 100, 255, 0.12), transparent 60%);
  animation: slowShift 22s infinite alternate;
}

@keyframes slowShift {
  0% { opacity: 0.4; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.2); }
}

/* main container – glass card stack */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.glass-card {
  background: rgba(20, 22, 35, 0.55);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-radius: 2rem;
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  padding: 2rem 2rem 2rem 2rem;
  width: 100%;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.glass-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 28px 48px rgba(0, 0, 0, 0.5);
}

/* glossy top line */
.card-gloss {
  position: relative;
}

.card-gloss::after {
  content: '';
  position: absolute;
  top: 0;
  left: 1.5rem;
  right: 1.5rem;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), rgba(200, 180, 255, 0.4), rgba(255, 255, 255, 0.2), transparent);
  border-radius: 100%;
}

/* header */
.brand {
  margin-bottom: 2rem;
}

.brand h1 {
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #ffffff, #c0c0ff, #a0a0ff);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  display: inline-block;
}

.brand p {
  font-size: 0.7rem;
  color: rgba(220, 220, 255, 0.45);
  margin-top: 0.25rem;
  letter-spacing: 0.3px;
}

/* user row */
.user-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 2rem;
  background: rgba(0, 0, 0, 0.25);
  padding: 0.6rem 1rem;
  border-radius: 3rem;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.username-g {
  font-size: 0.9rem;
  font-weight: 500;
  background: rgba(255, 255, 255, 0.05);
  padding: 0.2rem 1rem;
  border-radius: 2rem;
  letter-spacing: -0.2px;
}

.uid-badge {
  font-size: 0.7rem;
  color: rgba(255, 255, 255, 0.4);
  font-family: monospace;
}

.badge-list {
  display: flex;
  gap: 8px;
  align-items: center;
}

.badge-item {
  background: rgba(255, 255, 255, 0.06);
  border-radius: 2rem;
  padding: 4px 8px;
  font-size: 0.65rem;
  display: flex;
  align-items: center;
  gap: 5px;
  backdrop-filter: blur(4px);
}

.badge-item img {
  width: 14px;
  height: 14px;
  opacity: 0.7;
}

/* meta panel */
.meta-panel {
  background: rgba(10, 12, 20, 0.4);
  border-radius: 1.25rem;
  padding: 1rem 1.2rem;
  margin-bottom: 1.8rem;
  border: 1px solid rgba(255, 255, 255, 0.04);
}

.meta-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: rgba(200, 200, 240, 0.5);
  margin-bottom: 0.75rem;
}

.meta-line {
  font-size: 0.85rem;
  padding: 0.3rem 0;
  color: rgba(240, 240, 255, 0.8);
  border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
}

.meta-line:last-child {
  border-bottom: none;
}

/* social links glossy */
.social-links {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 2rem;
  align-items: center;
}

.glossy-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 3rem;
  padding: 0.5rem 1.2rem;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #e0e0f0;
  text-decoration: none;
  transition: all 0.2s ease;
}

.glossy-icon svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

.glossy-icon:hover {
  background: rgba(255, 255, 255, 0.12);
  transform: scale(1.02);
  border-color: rgba(200, 180, 255, 0.3);
  color: white;
}

/* like button */
.like-wrapper {
  display: inline-flex;
}

#like-btn {
  background: rgba(30, 32, 50, 0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 3rem;
  padding: 0.5rem 1.3rem;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 500;
  color: #ccccee;
  cursor: pointer;
  transition: all 0.2s;
}

#like-btn svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

#like-btn:hover {
  background: rgba(70, 60, 150, 0.5);
  transform: scale(1.02);
  color: white;
}

#like-btn.liked {
  color: #ff7b89;
  background: rgba(255, 80, 100, 0.15);
  border-color: rgba(255, 120, 140, 0.4);
}

/* footer */
.footer-note {
  font-size: 0.65rem;
  text-align: center;
  margin-top: 2rem;
  color: rgba(200, 200, 230, 0.3);
  letter-spacing: 0.5px;
}

/* responsive */
@media (max-width: 550px) {
  .glass-card { padding: 1.5rem; }
  .brand h1 { font-size: 1.6rem; }
  .user-row { gap: 8px; }
}

/* hide old canvas / video if you want fresh glass UI — we keep functionality but restyle */
#bgvideo, #wordfield, #trail {
  display: none;
}

/* overlay remains functional but restyled */
#overlay {
  background: rgba(0, 0, 0, 0.92);
  backdrop-filter: blur(12px);
}

#overlay-text {
  font-family: 'Inter', monospace;
  background: rgba(255,255,245,0.1);
  padding: 0.6rem 1.8rem;
  border-radius: 3rem;
  border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div class="glass-bg"></div>

<div id="overlay"><span id="overlay-text">⟡ enter ⟡</span></div>
<audio id="audio" loop></audio>
<video id="bgvideo" loop playsinline></video>
<canvas id="wordfield"></canvas>
<canvas id="trail"></canvas>

<div class="container">
  <div class="glass-card card-gloss">
    <div class="brand">
      <h1 id="site-name">forgave.lol</h1>
      <p>// glass interface</p>
    </div>

    <div class="user-row" id="user-row">
      <!-- JS fills -->
    </div>

    <div class="meta-panel">
      <div class="meta-label">last change · <span id="last-change-date"></span></div>
      <div class="meta-line" id="line1"></div>
      <div class="meta-line" id="line2"></div>
      <div class="meta-line" id="line3"></div>
      <div class="meta-line" id="discord-line" style="display:none">discord — <span id="discord-val"></span></div>
    </div>

    <div class="social-links" id="links-container"></div>

    <div style="display: flex; justify-content: flex-end;">
      <div class="like-wrapper">
        <button id="like-btn">
          <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3v11z"/></svg>
          <span id="like-num">...</span>
        </button>
      </div>
    </div>
    <div class="footer-note">forgave.lol / chloryl</div>
  </div>
</div>

<div id="not-found" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px); align-items:center; justify-content:center; flex-direction:column; z-index:20;">
  <div class="glass-card" style="text-align:center; max-width:300px;">
    <div style="font-size:1.2rem;">404</div>
    <div style="font-size:0.7rem; opacity:0.6;">forgave.lol/<span id="nf-slug"></span></div>
  </div>
</div>

<script>
/* ---------- CONFIG ---------- */
const MAIN = {
  siteName:   "forgave.lol",
  lastChange: "25 May 2026",
  username:   "chloryl",
  uid:        "0",
  badges: [
    { tip: "owner", img: "https://files.catbox.moe/h0f65g.png" },
    { tip: "developer", img: "https://cdn3.emoji.gg/emojis/8995-staff-icon.png", size: 13 }
  ],
  lines: [
    "@factor / on tiktok",
    "discord.gg/factor",
    "join discord via link"
  ],
  discord: "chloryl (355869591278452746)",
  links: [
    { label: "tiktok",  url: "https://tiktok.com/@factor", icon: "tiktok"  },
    { label: "discord", url: "https://discord.gg/factor",  icon: "discord" }
  ],
  bgVideo: { urls: [], opacity: 0 },
  bgWords: ["forgave"],
  wordCount: 0,
  music: { url: "", volume: 0 }
};

const USERS = {
  "prada": {
    siteName: "forgave.lol", lastChange: "25 May 2026", username: "prada", uid: "1", badges: [],
    lines: ["@juliasfanboy / on discord", "rich", "take risks"], discord: "",
    links: [{ label: "tiktok", url: "https://tiktok.com/@pradatopeu", icon: "tiktok" }],
    bgVideo: { urls: [] }, bgWords: ["prada"], wordCount: 0, music: { url: "", volume: 0 }
  },
  "btc": {
    siteName: "forgave.lol", lastChange: "25 May 2026", username: "btc", uid: "2",
    badges: [{ tip: "btc", img: "https://files.catbox.moe/mdlopx.png" }],
    lines: ["", "", ""], discord: "",
    links: [{ label: "roblox", url: "https://www.roblox.com/users/418312507/profile", icon: "roblox" }],
    bgVideo: { urls: [] }, bgWords: ["btc"], wordCount: 0, music: { url: "", volume: 0 }
  },
  "7": {
    siteName: "forgave.lol", lastChange: "26th May 2026", username: "7", uid: "3", badges: [],
    lines: ["@u3ls (1263468060317188097) / on discord", "", ""], discord: "",
    links: [], bgVideo: { urls: [] }, bgWords: ["7"], wordCount: 0, music: { url: "", volume: 0 }
  }
};

/* routing */
const slug = location.pathname.replace(/^\//, "").toLowerCase().trim();
let C = null;
let likeId = "forgave.lol";
if (!slug || slug === "") { C = MAIN; likeId = "forgave.lol"; }
else if (USERS[slug]) { C = USERS[slug]; likeId = "forgave.lol/" + slug; }
else { document.getElementById("not-found").style.display = "flex"; document.getElementById("nf-slug").innerText = slug; }

/* icons */
const ICONS = {
  tiktok: `<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg>`,
  discord: `<svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`,
  roblox: `<svg viewBox="0 0 24 24"><path d="M5.16 0L0 18.84 18.84 24 24 5.16 5.16 0zm8.32 13.65l-3.13-.86.86-3.13 3.13.86-.86 3.13z"/></svg>`
};

if (C) {
  document.getElementById("last-change-date").innerText = C.lastChange;
  const userRow = document.getElementById("user-row");
  userRow.innerHTML = `
    <span class="username-g">${C.username}</span>
    <span class="uid-badge">UID: ${C.uid}</span>
    <div class="badge-list">${ (C.badges || []).map(b => `<div class="badge-item"><img src="${b.img}" style="width:${b.size||14}px"> ${b.tip}</div>`).join('') }</div>
  `;
  document.getElementById("line1").innerText = C.lines[0] || "";
  document.getElementById("line2").innerText = C.lines[1] || "";
  document.getElementById("line3").innerText = C.lines[2] || "";
  if (C.discord) {
    document.getElementById("discord-line").style.display = "flex";
    document.getElementById("discord-val").innerText = C.discord;
  }
  const linksDiv = document.getElementById("links-container");
  linksDiv.innerHTML = "";
  C.links.forEach(lk => {
    const a = document.createElement("a");
    a.className = "glossy-icon";
    a.href = lk.url; a.target = "_blank";
    a.innerHTML = `${ICONS[lk.icon] || ""} ${lk.label}`;
    linksDiv.appendChild(a);
  });
}

/* like system (supabase) */
const SUPA_URL = "https://xqqwyugfyntgbgohzqcz.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxcXd5dWdmeW50Z2Jnb2h6cWN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjI1NTQsImV4cCI6MjA5NTE5ODU1NH0.Y-Z5HawSgxraigCep2BHINLvev98b3m3BGsI1DT_LQY";
const likeBtn = document.getElementById("like-btn");
const likeNum = document.getElementById("like-num");
const likeKey = "liked_" + likeId.replace(/\//g, "_");
let hasLiked = localStorage.getItem(likeKey) === "1";
if (hasLiked) likeBtn.classList.add("liked");

async function fetchLikes() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/likes?id=eq.${encodeURIComponent(likeId)}&select=count`, {
      headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }
    });
    const data = await res.json();
    if (!data[0]) {
      await fetch(`${SUPA_URL}/rest/v1/likes`, {
        method: "POST",
        headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ id: likeId, count: 0 })
      });
      likeNum.textContent = 0;
    } else {
      likeNum.textContent = data[0].count;
    }
  } catch { likeNum.textContent = "0"; }
}

async function updateLike(delta) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/likes?id=eq.${encodeURIComponent(likeId)}&select=count`, {
      headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }
    });
    const data = await res.json();
    const newCount = Math.max(0, (data[0]?.count ?? 0) + delta);
    await fetch(`${SUPA_URL}/rest/v1/likes?id=eq.${encodeURIComponent(likeId)}`, {
      method: "PATCH",
      headers: { apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ count: newCount })
    });
    likeNum.textContent = newCount;
  } catch {}
}

likeBtn.addEventListener("click", () => {
  if (!hasLiked) {
    hasLiked = true;
    localStorage.setItem(likeKey, "1");
    likeBtn.classList.add("liked");
    updateLike(1);
  } else {
    hasLiked = false;
    localStorage.removeItem(likeKey);
    likeBtn.classList.remove("liked");
    updateLike(-1);
  }
});

fetchLikes();

/* overlay + audio (minimal keep) */
const overlayDiv = document.getElementById("overlay");
const audioEl = document.getElementById("audio");
if (overlayDiv) {
  overlayDiv.addEventListener("click", () => {
    overlayDiv.classList.add("hide");
    setTimeout(() => overlayDiv.remove(), 500);
    if (C && C.music && C.music.url) {
      audioEl.src = C.music.url;
      audioEl.volume = C.music.volume || 0.3;
      audioEl.play().catch(()=>{});
    }
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>forgave.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-family: 'JetBrains Mono', monospace;
    overflow-y: auto;
    position: relative;
    padding: 40px 0;
  }

  /* Video Background */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }

  /* Overlay to darken video so text is readable */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1;
    pointer-events: none;
  }

  /* ===== CLICK TO ENTER OVERLAY ===== */
  #enter-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    opacity: 1;
    visibility: visible;
  }

  #enter-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #enter-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: pulse 2.4s ease-in-out infinite;
    user-select: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }

  .panel {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
    padding: 40px 60px 40px 0;
    animation: fadeIn 0.8s ease forwards;
    width: 100%;
    max-width: 460px;
    margin: 20px 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .title {
    font-family: 'Ephesis', cursive;
    font-size: 72px;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    animation: fadeIn 0.6s ease forwards;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 340px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    background: rgba(45, 45, 45, 0.82);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    color: #fff;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.18s, border-color 0.18s, transform 0.15s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
  }

  .link-btn:nth-child(1) { animation: slideIn 0.5s 0.2s ease both; }
  .link-btn:nth-child(2) { animation: slideIn 0.5s 0.35s ease both; }
  .link-btn:nth-child(3) { animation: slideIn 0.5s 0.5s ease both; }
  .link-btn:nth-child(4) { animation: slideIn 0.5s 0.65s ease both; }
  .link-btn:nth-child(5) { animation: slideIn 0.5s 0.8s ease both; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .link-btn:hover {
    background: rgba(70, 70, 70, 0.92);
    border-color: rgba(255,255,255,0.38);
    transform: translateX(-4px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .link-btn:active {
    transform: translateX(-2px) scale(0.98);
  }

  .link-btn img {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .watermark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    animation: fadeIn 1s 0.8s ease both;
    white-space: nowrap;
    z-index: 2;
  }

  /* Mobile */
  @media (max-width: 600px) {
    body {
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
      padding-bottom: 40px;
      overflow-y: auto;
    }

    .panel {
      align-items: center;
      padding: 0 20px 40px 20px;
      max-width: 100%;
      margin: 0;
    }

    .title {
      font-size: 56px;
      margin-bottom: 20px;
      text-align: center;
    }

    .links {
      width: 100%;
      max-width: 360px;
    }

    .link-btn {
      font-size: 14px;
      padding: 16px 18px;
    }

    .link-btn:hover {
      transform: none;
    }

    .link-btn:active {
      transform: scale(0.97);
      background: rgba(70, 70, 70, 0.92);
    }

    .watermark {
      bottom: 12px;
      font-size: 11px;
    }
  }
</style>
</head>
<body>

<!-- ===== CLICK TO ENTER OVERLAY ===== -->
<div id="enter-overlay">
  <span id="enter-text">click to enter</span>
</div>

<!-- Video Background -->
<video id="bg-video" muted loop playsinline>
  <source src="" type="video/mp4">
  Your browser does not support the video tag.
</video>

<!-- Dark Overlay -->
<div class="overlay"></div>

<div class="panel">
  <div class="title" id="page-title">@59600</div>
  <div class="links" id="links-container"></div>
</div>

<div class="watermark" id="watermark-text">forgave.lol</div>

<script>
// ============================================================
//  🎯 CONFIG – EDIT THIS SECTION
// ============================================================
const CONFIG = {
  // ===== TITLE =====
  title: '@59600',

  // ===== VIDEO PLAYLIST =====
  // Add any number of video URLs – one will be chosen randomly on each refresh
  videos: [
    'https://files.catbox.moe/7soj1p.mp4',
    'https://files.catbox.moe/ydn1qw.mp4',
    'https://files.catbox.moe/3sauin.mp4',
    'https://files.catbox.moe/5k3ear.mp4'
  ],

  // ===== LINKS =====
  // Each link: { label: 'Display Text', icon: 'icon-name', url: 'https://...' }
  // Icon names: youtube, discord, roblox, luau, twitter, instagram, tiktok, github, spotify, twitch
  links: [
    { label: '@59600', icon: 'youtube', url: 'https://forgave.lol' },
    { label: 'forgave.lol', icon: 'discord', url: 'https://forgave.lol' },
    { label: 'forgave.lol', icon: 'roblox', url: 'https://forgave.lol' },
    { label: 'forgave.lol', icon: 'luau', url: 'https://forgave.lol' }
  ],

  // ===== WATERMARK =====
  watermark: 'forgave.lol',

  // ===== OVERLAY TEXT =====
  overlayText: 'enter',

  // ===== OVERLAY DARKNESS (0 = no darkening, 1 = completely dark) =====
  overlayDarkness: 0.55,

  // ===== VIDEO SETTINGS =====
  randomOnRefresh: true, // Pick a random video on each refresh
  bgColor: '#000' // Fallback background color
};

// ============================================================
//  DO NOT EDIT BELOW THIS LINE – the code uses CONFIG above
// ============================================================

// ===== SET TITLE =====
document.getElementById('page-title').textContent = CONFIG.title;

// ===== SET WATERMARK =====
document.getElementById('watermark-text').textContent = CONFIG.watermark;

// ===== SET OVERLAY TEXT =====
document.getElementById('enter-text').textContent = CONFIG.overlayText;

// ===== SET OVERLAY DARKNESS =====
document.querySelector('.overlay').style.background = `rgba(0, 0, 0, ${CONFIG.overlayDarkness})`;

// ===== SET BACKGROUND COLOR =====
document.body.style.background = CONFIG.bgColor;

// ===== BUILD LINKS =====
const iconMap = {
  youtube: 'https://cdn.simpleicons.org/youtube/ffffff',
  discord: 'https://cdn.simpleicons.org/discord/ffffff',
  roblox: 'https://cdn.simpleicons.org/roblox/ffffff',
  luau: 'https://cdn.simpleicons.org/luau/ffffff',
  twitter: 'https://cdn.simpleicons.org/twitter/ffffff',
  instagram: 'https://cdn.simpleicons.org/instagram/ffffff',
  tiktok: 'https://cdn.simpleicons.org/tiktok/ffffff',
  github: 'https://cdn.simpleicons.org/github/ffffff',
  spotify: 'https://cdn.simpleicons.org/spotify/ffffff',
  twitch: 'https://cdn.simpleicons.org/twitch/ffffff'
};

const linksContainer = document.getElementById('links-container');
linksContainer.innerHTML = '';
CONFIG.links.forEach((link, index) => {
  const a = document.createElement('a');
  a.className = 'link-btn';
  a.href = link.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.style.animationDelay = `${0.15 * (index + 1)}s`;

  const img = document.createElement('img');
  img.src = iconMap[link.icon] || iconMap.youtube;
  img.alt = link.icon;
  img.width = 22;
  img.height = 22;

  const span = document.createElement('span');
  span.textContent = link.label;

  a.appendChild(img);
  a.appendChild(span);
  linksContainer.appendChild(a);
});

// ===== VIDEO PLAYLIST =====
const video = document.getElementById('bg-video');
const videoUrls = CONFIG.videos;

// Pick a random video
function getRandomVideo() {
  const randomIndex = Math.floor(Math.random() * videoUrls.length);
  return videoUrls[randomIndex];
}

// Set the video source
function setVideoSource(url) {
  video.src = url;
  video.load();
}

// Load a random video on refresh
if (CONFIG.randomOnRefresh && videoUrls.length > 0) {
  const randomUrl = getRandomVideo();
  setVideoSource(randomUrl);
} else if (videoUrls.length > 0) {
  setVideoSource(videoUrls[0]);
}

// ===== CLICK TO ENTER =====
const enterOverlay = document.getElementById('enter-overlay');

enterOverlay.addEventListener('click', function() {
  // Unmute and play the video
  video.muted = false;
  video.play().catch(function(error) {
    console.log('Autoplay with sound blocked:', error);
    video.muted = true;
    video.play().catch(function(e) {
      console.log('Video play failed:', e);
    });
  });

  this.classList.add('hidden');
});

// Preload video
video.preload = 'auto';

// ===== HANDLE VIDEO END =====
// When one video ends, play another random one
video.addEventListener('ended', function() {
  if (videoUrls.length > 1) {
    const randomUrl = getRandomVideo();
    setVideoSource(randomUrl);
    video.play().catch(function(e) {
      console.log('Next video play failed:', e);
    });
  }
});

// ===== RESPONSIVE VIDEO PLAY ON MOBILE =====
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && video.paused && !enterOverlay.classList.contains('hidden')) {
    // If the page becomes visible again and video is paused, keep it paused until user clicks
  }
});

console.log('🎬 forgave.lol loaded with config:', CONFIG);
</script>

</body>
</html>

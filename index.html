<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>forgave.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    overflow-y: auto;
    position: relative;
    padding: 40px 20px;
    gap: 40px;
    flex-wrap: wrap;
  }

  /* Video Background */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }

  /* Overlay to darken video so text is readable */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1;
    pointer-events: none;
  }

  /* ===== CLICK TO ENTER OVERLAY ===== */
  #enter-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    opacity: 1;
    visibility: visible;
  }

  #enter-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #enter-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: pulse 2.4s ease-in-out infinite;
    user-select: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }

  /* ===== LEFT PROFILE CARD (guns.lol style) ===== */
  .profile-card {
    position: relative;
    z-index: 2;
    background: rgba(10, 10, 12, 0.75);
    backdrop-filter: blur(24px) saturate(140%) brightness(1.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-top-color: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 24px 64px rgba(0,0,0,0.7);
    text-align: center;
    flex-shrink: 0;
  }

  .profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 14px;
    display: block;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
  }

  .profile-name {
    font-size: 1.1rem;
    font-weight: 500;
    color: rgba(255,255,255,0.92);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .profile-username {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .profile-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    color: rgba(100, 220, 150, 0.85);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border: 1px solid rgba(100, 220, 150, 0.2);
    border-radius: 30px;
    background: rgba(100, 220, 150, 0.06);
    margin-bottom: 16px;
  }

  .profile-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6f6;
    animation: statusPulse 2s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .profile-bio {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .profile-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    margin: 14px 0 16px;
  }

  .profile-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
  }

  .profile-stat {
    text-align: center;
  }

  .profile-stat .number {
    font-size: 1.1rem;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.5px;
  }

  .profile-stat .label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.2);
    margin-top: 2px;
  }

  /* ===== RIGHT PANEL (links) ===== */
  .panel {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
    padding: 0;
    animation: fadeIn 0.8s ease forwards;
    width: 100%;
    max-width: 460px;
    margin: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .title {
    font-family: 'Ephesis', cursive;
    font-size: 72px;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    animation: fadeIn 0.6s ease forwards;
    text-align: right;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 340px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    background: rgba(45, 45, 45, 0.82);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    color: #fff;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.18s, border-color 0.18s, transform 0.15s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
  }

  .link-btn:nth-child(1) { animation: slideIn 0.5s 0.2s ease both; }
  .link-btn:nth-child(2) { animation: slideIn 0.5s 0.35s ease both; }
  .link-btn:nth-child(3) { animation: slideIn 0.5s 0.5s ease both; }
  .link-btn:nth-child(4) { animation: slideIn 0.5s 0.65s ease both; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .link-btn:hover {
    background: rgba(70, 70, 70, 0.92);
    border-color: rgba(255,255,255,0.38);
    transform: translateX(-4px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .link-btn:active {
    transform: translateX(-2px) scale(0.98);
  }

  .link-btn img {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .watermark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    animation: fadeIn 1s 0.8s ease both;
    white-space: nowrap;
    z-index: 2;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    body {
      flex-direction: column;
      padding: 20px 16px 40px;
      gap: 24px;
      align-items: center;
      justify-content: flex-start;
    }

    .profile-card {
      max-width: 100%;
      padding: 24px 20px 20px;
    }

    .panel {
      align-items: center;
      max-width: 100%;
    }

    .title {
      font-size: 56px;
      text-align: center;
    }

    .links {
      width: 100%;
      max-width: 360px;
    }

    .link-btn {
      font-size: 14px;
      padding: 16px 18px;
    }

    .link-btn:hover {
      transform: none;
    }

    .link-btn:active {
      transform: scale(0.97);
      background: rgba(70, 70, 70, 0.92);
    }

    .watermark {
      bottom: 12px;
      font-size: 11px;
    }
  }

  @media (max-width: 400px) {
    .profile-avatar {
      width: 64px;
      height: 64px;
    }

    .profile-name {
      font-size: 0.95rem;
    }

    .profile-stats {
      gap: 16px;
    }

    .title {
      font-size: 44px;
    }

    .link-btn {
      font-size: 13px;
      padding: 14px 16px;
    }
  }
</style>
</head>
<body>

<!-- ===== CLICK TO ENTER OVERLAY ===== -->
<div id="enter-overlay">
  <span id="enter-text">click to enter</span>
</div>

<!-- Video Background -->
<video id="bg-video" muted loop playsinline>
  <source src="" type="video/mp4">
  Your browser does not support the video tag.
</video>

<!-- Dark Overlay -->
<div class="overlay"></div>

<!-- ===== LEFT PROFILE CARD ===== -->
<div class="profile-card" id="profile-card">
  <img class="profile-avatar" id="profile-avatar" src="https://cdn.discordapp.com/avatars/1263468060317188097/your_avatar_hash.webp" alt="Avatar" onerror="this.style.display='none'">
  <div class="profile-name" id="profile-name">59600</div>
  <div class="profile-username" id="profile-username">@59600</div>
  <div class="profile-status"><span class="dot"></span> Online</div>
  <div class="profile-bio" id="profile-bio">creator of forgave.lol</div>
  <div class="profile-divider"></div>
  <div class="profile-stats">
    <div class="profile-stat"><div class="number" id="stat-followers">0</div><div class="label">Followers</div></div>
    <div class="profile-stat"><div class="number" id="stat-likes">0</div><div class="label">Likes</div></div>
    <div class="profile-stat"><div class="number" id="stat-views">0</div><div class="label">Views</div></div>
  </div>
</div>

<!-- ===== RIGHT PANEL (links) ===== -->
<div class="panel">
  <div class="title" id="page-title">@59600</div>
  <div class="links" id="links-container"></div>
</div>

<div class="watermark" id="watermark-text">forgave.lol</div>

<script>
// ============================================================
//  🎯 CONFIG – EDIT THIS SECTION
// ============================================================
const CONFIG = {
  // ===== PROFILE CARD =====
  profile: {
    name: '59600',
    username: '@59600',
    avatar: 'https://cdn.discordapp.com/avatars/1263468060317188097/your_avatar_hash.webp', // Replace with your Discord avatar URL
    bio: 'creator of forgave.lol',
    status: 'Online',
    followers: 0,
    likes: 0,
    views: 0
  },

  // ===== TITLE =====
  title: '@59600',

  // ===== VIDEO PLAYLIST =====
  videos: [
    'https://files.catbox.moe/7soj1p.mp4',
    'https://files.catbox.moe/ydn1qw.mp4',
    'https://files.catbox.moe/3sauin.mp4',
    'https://files.catbox.moe/5k3ear.mp4'
  ],

  // ===== LINKS =====
  links: [
    { label: '@59600', icon: 'youtube', url: 'https://forgave.lol' },
    { label: 'forgave.lol', icon: 'discord', url: 'https://forgave.lol' },
    { label: 'forgave.lol', icon: 'roblox', url: 'https://forgave.lol' },
    { label: 'forgave.lol', icon: 'luau', url: 'https://forgave.lol' }
  ],

  // ===== WATERMARK =====
  watermark: 'forgave.lol',

  // ===== OVERLAY TEXT =====
  overlayText: 'click to enter',

  // ===== OVERLAY DARKNESS =====
  overlayDarkness: 0.55,

  // ===== VIDEO SETTINGS =====
  randomOnRefresh: true,
  bgColor: '#000'
};

// ============================================================
//  DO NOT EDIT BELOW THIS LINE
// ============================================================

// ===== SET PROFILE CARD =====
document.getElementById('profile-name').textContent = CONFIG.profile.name;
document.getElementById('profile-username').textContent = CONFIG.profile.username;
document.getElementById('profile-bio').textContent = CONFIG.profile.bio;
document.getElementById('stat-followers').textContent = CONFIG.profile.followers;
document.getElementById('stat-likes').textContent = CONFIG.profile.likes;
document.getElementById('stat-views').textContent = CONFIG.profile.views;

// Avatar
const avatar = document.getElementById('profile-avatar');
if (CONFIG.profile.avatar) {
  avatar.src = CONFIG.profile.avatar;
  avatar.style.display = 'block';
} else {
  avatar.style.display = 'none';
}

// Status
const statusEl = document.querySelector('.profile-status');
if (CONFIG.profile.status) {
  statusEl.innerHTML = `<span class="dot"></span> ${CONFIG.profile.status}`;
}

// ===== SET TITLE =====
document.getElementById('page-title').textContent = CONFIG.title;

// ===== SET WATERMARK =====
document.getElementById('watermark-text').textContent = CONFIG.watermark;

// ===== SET OVERLAY TEXT =====
document.getElementById('enter-text').textContent = CONFIG.overlayText;

// ===== SET OVERLAY DARKNESS =====
document.querySelector('.overlay').style.background = `rgba(0, 0, 0, ${CONFIG.overlayDarkness})`;
document.body.style.background = CONFIG.bgColor;

// ===== BUILD LINKS =====
const iconMap = {
  youtube: 'https://cdn.simpleicons.org/youtube/ffffff',
  discord: 'https://cdn.simpleicons.org/discord/ffffff',
  roblox: 'https://cdn.simpleicons.org/roblox/ffffff',
  luau: 'https://cdn.simpleicons.org/luau/ffffff',
  twitter: 'https://cdn.simpleicons.org/twitter/ffffff',
  instagram: 'https://cdn.simpleicons.org/instagram/ffffff',
  tiktok: 'https://cdn.simpleicons.org/tiktok/ffffff',
  github: 'https://cdn.simpleicons.org/github/ffffff',
  spotify: 'https://cdn.simpleicons.org/spotify/ffffff',
  twitch: 'https://cdn.simpleicons.org/twitch/ffffff'
};

const linksContainer = document.getElementById('links-container');
linksContainer.innerHTML = '';
CONFIG.links.forEach((link, index) => {
  const a = document.createElement('a');
  a.className = 'link-btn';
  a.href = link.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.style.animationDelay = `${0.15 * (index + 1)}s`;

  const img = document.createElement('img');
  img.src = iconMap[link.icon] || iconMap.youtube;
  img.alt = link.icon;
  img.width = 22;
  img.height = 22;

  const span = document.createElement('span');
  span.textContent = link.label;

  a.appendChild(img);
  a.appendChild(span);
  linksContainer.appendChild(a);
});

// ===== VIDEO PLAYLIST =====
const video = document.getElementById('bg-video');
const videoUrls = CONFIG.videos;

function getRandomVideo() {
  return videoUrls[Math.floor(Math.random() * videoUrls.length)];
}

function setVideoSource(url) {
  video.src = url;
  video.load();
}

if (CONFIG.randomOnRefresh && videoUrls.length > 0) {
  setVideoSource(getRandomVideo());
} else if (videoUrls.length > 0) {
  setVideoSource(videoUrls[0]);
}

// ===== CLICK TO ENTER =====
const enterOverlay = document.getElementById('enter-overlay');

enterOverlay.addEventListener('click', function() {
  video.muted = false;
  video.play().catch(() => {
    video.muted = true;
    video.play().catch(() => {});
  });
  this.classList.add('hidden');
});

video.preload = 'auto';

video.addEventListener('ended', function() {
  if (videoUrls.length > 1) {
    setVideoSource(getRandomVideo());
    video.play().catch(() => {});
  }
});
</script>

</body>
</html>

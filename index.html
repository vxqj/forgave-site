<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>forgave.lol</title>
<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
    position: relative;
  }

  /* Video Background */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
  }

  /* Overlay to darken video so text is readable */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: 1;
    pointer-events: none;
  }

  /* ===== CLICK TO ENTER OVERLAY ===== */
  #enter-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    opacity: 1;
    visibility: visible;
  }

  #enter-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #enter-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: pulse 2.4s ease-in-out infinite;
    user-select: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }

  .panel {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
    padding: 40px 60px 40px 0;
    animation: fadeIn 0.8s ease forwards;
    width: 100%;
    max-width: 460px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .title {
    font-family: 'Ephesis', cursive;
    font-size: 72px;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    animation: fadeIn 0.6s ease forwards;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 340px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    background: rgba(45, 45, 45, 0.82);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 10px;
    color: #fff;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.18s, border-color 0.18s, transform 0.15s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
  }

  .link-btn:nth-child(1) { animation: slideIn 0.5s 0.2s ease both; }
  .link-btn:nth-child(2) { animation: slideIn 0.5s 0.35s ease both; }
  .link-btn:nth-child(3) { animation: slideIn 0.5s 0.5s ease both; }
  .link-btn:nth-child(4) { animation: slideIn 0.5s 0.65s ease both; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .link-btn:hover {
    background: rgba(70, 70, 70, 0.92);
    border-color: rgba(255,255,255,0.38);
    transform: translateX(-4px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .link-btn:active {
    transform: translateX(-2px) scale(0.98);
  }

  .link-btn img {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .watermark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    animation: fadeIn 1s 0.8s ease both;
    white-space: nowrap;
    z-index: 2;
  }

  /* Mobile */
  @media (max-width: 600px) {
    body {
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
      overflow-y: auto;
    }

    .panel {
      align-items: center;
      padding: 0 20px 80px 20px;
      max-width: 100%;
    }

    .title {
      font-size: 56px;
      margin-bottom: 20px;
      text-align: center;
    }

    .links {
      width: 100%;
      max-width: 360px;
    }

    .link-btn {
      font-size: 14px;
      padding: 16px 18px;
    }

    .link-btn:hover {
      transform: none;
    }

    .link-btn:active {
      transform: scale(0.97);
      background: rgba(70, 70, 70, 0.92);
    }
  }
</style>
</head>

  const enterOverlay = document.getElementById('enter-overlay');
  const video = document.getElementById('bg-video');

  enterOverlay.addEventListener('click', function() {
    // Unmute and play the video
    video.muted = false;
    video.play().catch(function(error) {
      console.log('Autoplay with sound blocked:', error);
      // If autoplay with sound is blocked, try muted first
      video.muted = true;
      video.play().catch(function(e) {
        console.log('Video play failed:', e);
      });
    });

    // Hide the overlay
    this.classList.add('hidden');
  });

  // Preload video (starts loading in background)
  video.preload = 'auto';

  // Handle visibility change (if user switches tabs, video might pause)
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && video.paused && !enterOverlay.classList.contains('hidden')) {
      // If the page becomes visible again and video is paused, keep it paused until user clicks
    }
  });
</script>

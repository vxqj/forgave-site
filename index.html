<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>forgave</title>
<link rel="icon" href="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --accent: #6c5ce7;
    --bg-0: #060608;
    --card-bg: rgba(14,14,18,0.55);
    --card-border-color: rgba(255,255,255,0.12);
    --card-border-width: 1px;
    --card-radius: 6px;
    --text-0: #f2f2f4;
    --text-1: #9a9aa3;
    --text-2: #5e5e66;
    --font-display: 'Manrope', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family: var(--font-display);
    background: var(--bg-0);
    color: var(--text-0);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}

  #bg-layer{ position:fixed; inset:0; z-index:0; overflow:hidden; background:var(--bg-0); }
  #bg-overlay{ position:absolute; inset:0; z-index:1; pointer-events:none; }
  #bg-media-wrap{ position:absolute; inset:-6%; will-change:transform; }
  #bg-image, #bg-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }

  #page{
    position:relative; z-index:2; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:40px 18px;
  }

  /* CARD — tall rectangle, flat border, no glow/animation by default.
     Shape/opacity/border are all driven by CONFIG. */
  #card{
    position:relative;
    width:100%;
    max-width:340px;
    background:var(--card-bg);
    border:var(--card-border-width) solid var(--card-border-color);
    border-radius:var(--card-radius);
    backdrop-filter:blur(18px) saturate(130%);
    -webkit-backdrop-filter:blur(18px) saturate(130%);
    overflow:hidden;
    opacity:0;
    transform:translateY(10px);
    animation:cardIn 0.5s ease forwards;
    animation-delay:0.05s;
  }
  @keyframes cardIn{ to{opacity:1; transform:translateY(0);} }

  #card-inner{ position:relative; padding:0 0 22px; }

  #banner{ position:relative; width:100%; height:130px; overflow:hidden; background:#15151a; }
  #banner img{ width:100%;height:100%;object-fit:cover;display:block; }
  #banner-fade{ position:absolute;inset:0; background:linear-gradient(180deg, rgba(10,10,13,0) 45%, var(--card-bg) 100%); }

  #avatar-wrap{ position:relative; width:84px;height:84px; margin:-42px auto 0; z-index:3; }
  #avatar{
    width:100%;height:100%; border-radius:50%; object-fit:cover;
    border:3px solid var(--bg-0); background:#1a1a20; display:block;
  }
  #status-dot{
    position:absolute; width:15px;height:15px; bottom:0px;right:0px;
    border-radius:50%; border:3px solid var(--bg-0); background:#3ddc7a;
  }
  #status-dot.idle{background:#f3a93a;}
  #status-dot.dnd{background:#ed4356;}
  #status-dot.offline{background:#5e5e66;}

  #identity{ text-align:center; padding:12px 26px 0; }
  #name-row{ display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
  #display-name{ font-size:17px; font-weight:700; letter-spacing:-0.01em; }
  #badges{ display:flex; gap:4px; align-items:center; }
  #badges img{ width:16px;height:16px; object-fit:contain; }
  #username{ margin-top:2px; font-family:var(--font-mono); font-size:12px; color:var(--text-2); }
  #bio{ margin-top:12px; font-size:13px; line-height:1.55; color:var(--text-1); white-space:pre-line; }

  #typewriter{ margin-top:8px; font-family:var(--font-mono); font-size:12px; color:var(--accent); min-height:16px; }
  #typewriter .cursor{
    display:inline-block; width:1px;height:11px; background:var(--accent);
    margin-left:2px; vertical-align:-1px; animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  #stats{ display:flex; justify-content:center; gap:20px; margin-top:14px; }
  .stat{ text-align:center; }
  .stat-value{ font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--text-0); }
  .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-2); margin-top:2px; }

  .divider{ height:1px; margin:16px 24px; background:var(--card-border-color); }

  #socials{ display:flex; justify-content:center; gap:9px; flex-wrap:wrap; padding:0 24px; }
  .social-btn{
    width:34px;height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.05); border:1px solid var(--card-border-color);
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .social-btn svg{ width:15px;height:15px; fill:var(--text-1); transition:fill 0.15s ease; }
  .social-btn:hover{ background:rgba(255,255,255,0.1); border-color:var(--accent); }
  .social-btn:hover svg{fill:var(--text-0);}

  #links{ display:flex; flex-direction:column; gap:8px; padding:16px 24px 0; }
  .link-btn{
    display:flex; align-items:center; gap:10px; padding:10px 13px; border-radius:5px;
    background:rgba(255,255,255,0.04); border:1px solid var(--card-border-color);
    font-size:12.5px; font-weight:500; transition:background 0.15s ease, border-color 0.15s ease;
  }
  .link-btn:hover{ background:rgba(255,255,255,0.07); border-color:var(--accent); }
  .link-btn .link-icon{ width:15px;height:15px; flex:0 0 auto; fill:var(--text-1); }
  .link-btn span{flex:1;}
  .link-btn .link-arrow{ width:12px;height:12px; opacity:0.5; flex:0 0 auto; }

  #discord-card{
    margin:16px 24px 0; padding:11px; border-radius:5px;
    background:rgba(88,101,242,0.08); border:1px solid rgba(88,101,242,0.22);
    display:flex; gap:9px; align-items:center;
  }
  #discord-card img{ width:32px;height:32px; border-radius:50%; }
  #discord-card .dc-info{flex:1; min-width:0;}
  #discord-card .dc-name{ font-size:12px; font-weight:600; }
  #discord-card .dc-sub{ font-size:10.5px; color:var(--text-2); font-family:var(--font-mono); }

  #footer{ margin-top:16px; text-align:center; font-family:var(--font-mono); font-size:10px; color:var(--text-2); }
  #footer a{ color:var(--text-2); border-bottom:1px solid transparent; }
  #footer a:hover{ color:var(--text-1); border-bottom-color:var(--text-2); }

  #particle-layer{ position:fixed; inset:0; z-index:1; pointer-events:none; }
  .particle{ position:absolute; border-radius:50%; background:var(--accent); pointer-events:none; }

  #audio-bar{
    position:fixed; bottom:16px; right:16px; z-index:5;
    display:flex; align-items:center; gap:8px; padding:7px 11px; border-radius:5px;
    background:var(--card-bg); border:1px solid var(--card-border-color); backdrop-filter:blur(14px);
    font-family:var(--font-mono); font-size:10.5px; color:var(--text-1); cursor:pointer; user-select:none;
  }
  #audio-bar svg{width:12px;height:12px;fill:var(--text-1);}
  #audio-bar.playing svg{fill:var(--accent);}
  #audio-eq{ display:flex; align-items:center; gap:2px; height:10px; }
  #audio-eq span{ width:2px; background:var(--accent); border-radius:1px; animation:eq 0.9s ease-in-out infinite; }
  #audio-eq span:nth-child(1){animation-delay:0s;}
  #audio-eq span:nth-child(2){animation-delay:0.2s;}
  #audio-eq span:nth-child(3){animation-delay:0.4s;}
  #audio-bar:not(.playing) #audio-eq span{animation-play-state:paused; height:30% !important;}
  @keyframes eq{ 0%,100%{transform:scaleY(0.4);} 50%{transform:scaleY(1);} }

  #enter-overlay{
    position:fixed; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg-0); flex-direction:column; gap:12px; cursor:pointer;
    transition:opacity 0.4s ease;
  }
  #enter-overlay.hidden{opacity:0; pointer-events:none;}
  #enter-overlay .enter-name{ font-size:20px; font-weight:700; }
  #enter-overlay .enter-hint{
    font-family:var(--font-mono); font-size:10.5px; color:var(--text-2);
    letter-spacing:0.05em; text-transform:uppercase; display:flex; align-items:center; gap:8px;
  }
  #enter-overlay .enter-hint::before, #enter-overlay .enter-hint::after{
    content:''; width:22px; height:1px; background:var(--text-2);
  }

  @media (prefers-reduced-motion: reduce){ #card{animation:none; opacity:1; transform:none;} }
  a:focus-visible, button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  @media (max-width:420px){ #card{max-width:100%;} }
</style>
</head>
<body>

<div id="bg-layer">
  <div id="bg-media-wrap">
    <img id="bg-image" src="" alt="">
    <video id="bg-video" autoplay muted loop playsinline></video>
  </div>
  <div id="bg-overlay"></div>
</div>
<div id="particle-layer"></div>

<div id="enter-overlay">
  <div class="enter-name" id="enter-name">forgave</div>
  <div class="enter-hint">click to enter</div>
</div>

<div id="page">
  <div id="card">
    <div id="card-inner">

      <div id="banner">
        <img id="banner-img" src="" alt="">
        <div id="banner-fade"></div>
      </div>

      <div id="avatar-wrap">
        <img id="avatar" src="" alt="avatar">
        <div id="status-dot"></div>
      </div>

      <div id="identity">
        <div id="name-row">
          <span id="display-name"></span>
          <span id="badges"></span>
        </div>
        <div id="username"></div>
        <div id="bio"></div>
        <div id="typewriter"><span id="typewriter-text"></span><span class="cursor"></span></div>
        <div id="stats"></div>
      </div>

      <div class="divider"></div>

      <div id="socials"></div>
      <div id="links"></div>

      <div id="discord-card" style="display:none;">
        <img id="dc-avatar" src="" alt="">
        <div class="dc-info">
          <div class="dc-name" id="dc-name"></div>
          <div class="dc-sub" id="dc-sub"></div>
        </div>
      </div>

      <div id="footer"></div>

    </div>
  </div>
</div>

<div id="audio-bar" style="display:none;">
  <svg id="audio-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
  <div id="audio-eq"><span></span><span></span><span></span></div>
  <span id="audio-label">play</span>
</div>
<audio id="audio-el" loop></audio>

<script>
/* =====================================================================
   ============================  CONFIG  ================================
   =====================================================================
   Edit everything in this object. Nothing else in the file needs to
   be touched for normal use.

   CATBOX LINKS: paste the direct file link, e.g.
   "https://files.catbox.moe/abc123.png" — not the catbox page URL.

   Leave any field as "" (empty string) to hide that element.
   true / false fields are real booleans — type true or false,
   no quotes around them.
   ===================================================================== */

const CONFIG = {

  meta: {
    title: "cash",
    favicon: "",
    description: "",
    themeColor: "#6c5ce7"
  },

  // "click to enter" screen — also unlocks autoplay audio (browsers
  // block autoplay until the visitor interacts with the page)
  enterGate: {
    enabled: true,
    nameText: "cash",
    hintText: "click to enter"
  },

  profile: {
    displayName: "nathan",
    username: "@cash",
    avatar: "",
    banner: "",
    bio: "building things on the internet.",
    status: "online",   // "online" | "idle" | "dnd" | "offline"

    typewriter: {
      enabled: true,
      speedMs: 55,
      pauseMs: 1800,
      phrases: ["developer", "forgave.lol"]
    },

    badges: [
      // { icon: "https://files.catbox.moe/example.png", label: "Verified" }
    ]
  },

  // -------------------------------------------------------------
  // VIEW COUNTER — real, cross-visitor count, not per-browser.
  // Uses a free public counter API, no signup/keys needed.
  // Every unique "counterKey" is its own shared counter. Change it
  // to something unique to you so you don't share a number with a
  // stranger who happened to pick the same default key.
  //
  // If this provider ever goes down, swap apiBase for another
  // CountAPI-compatible host — the URL shape is the same:
  //   GET {apiBase}/hit/{counterKey}  -> increments + returns value
  //   GET {apiBase}/get/{counterKey}  -> reads without incrementing
  // -------------------------------------------------------------
  viewCounter: {
    enabled: true,
    apiBase: "https://countapi.mileshilliard.com/api/v1",
    counterKey: "forgave_lol_biolink_views_8f2k",
    label: "views"
  },

  stats: {
    joined: { show: true, label: "joined", value: "2026" },
    uid: { show: false, label: "uid", value: "0001" }
  },

  // type: discord, twitter, x, instagram, github, youtube, tiktok,
  // twitch, spotify, telegram, snapchat, steam, website, email
  socials: [
    { type: "discord",   url: "" },
    { type: "github",    url: "" },
    { type: "twitter",   url: "" },
    { type: "instagram", url: "" },
    { type: "website",   url: "" }
  ],

  links: [
    // { label: "my main project", url: "https://forgave.lol", icon: "website" }
  ],

  discordCard: {
    enabled: false,
    avatar: "",
    name: "forgave",
    subtext: "Listening to Spotify"
  },

  // live version via Lanyard (free, no signup needed on your end —
  // you just need to have joined the Lanyard discord server once)
  lanyard: {
    enabled: false,
    discordUserId: ""
  },

  background: {
    type: "video",   // "image" | "video" | "color"
    image: "",
    video: "https://files.catbox.moe/7soj1p.mp4",
    videoLoop: true,
    videoMuted: false,
    fallbackColor: "#060608",
    overlayOpacity: 0.55,

    parallax: { enabled: true, strength: 16 },
    ambientMotion: { enabled: true, durationSec: 26 }
  },

  particles: {
    enabled: false,
    color: "",
    size: 4,
    count: 1,
    life: 700
  },

  audio: {
    enabled: false,
    url: "",
    autoplay: true,
    startVolume: 0.4,
    label: { playing: "now playing", paused: "play" }
  },

  // -------------------------------------------------------------
  // CARD APPEARANCE
  // -------------------------------------------------------------
  card: {
    // 0 = fully transparent, 1 = fully solid. Try 0 with
    // border.enabled true for an "outline only" look.
    backgroundOpacity: 0.55,
    backgroundColor: "#0e0e12",

    // glass blur of whatever's behind the card. 0 turns it off.
    blurPx: 18,

    border: {
      enabled: true,
      width: 1,
      color: "rgba(255,255,255,0.12)",
      rounded: false   // true = rounded corners, false = straight/square corners
    },

    cornerRadiusPx: 10   // only used when border.rounded is true
  },

  theme: {
    accent: "#6c5ce7",
    backgroundBase: "#060608",
    textPrimary: "#f2f2f4",
    textSecondary: "#9a9aa3",
    textTertiary: "#5e5e66",
    fontDisplay: "'Manrope', system-ui, sans-serif",
    fontMono: "'JetBrains Mono', monospace"
  },

  footer: {
    text: "forgave.lol",
    linkUrl: "https://forgave.lol"
  }

};

/* =====================================================================
   ============================  ENGINE  ================================
   You don't need to edit anything below this line for normal use.
   ===================================================================== */
(function(){
  "use strict";
  const root = document.documentElement;

  function hexToRgba(hex, alpha){
    if(hex.startsWith('rgba') || hex.startsWith('rgb')) return hex;
    let h = hex.replace('#','');
    if(h.length === 3) h = h.split('').map(c=>c+c).join('');
    const num = parseInt(h,16);
    const r = (num>>16)&255, g=(num>>8)&255, b=num&255;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function applyTheme(){
    const t = CONFIG.theme;
    root.style.setProperty('--accent', t.accent);
    root.style.setProperty('--bg-0', t.backgroundBase);
    root.style.setProperty('--text-0', t.textPrimary);
    root.style.setProperty('--text-1', t.textSecondary);
    root.style.setProperty('--text-2', t.textTertiary);
    root.style.setProperty('--font-display', t.fontDisplay);
    root.style.setProperty('--font-mono', t.fontMono);
  }

  function applyCardAppearance(){
    const c = CONFIG.card;
    root.style.setProperty('--card-bg', hexToRgba(c.backgroundColor, c.backgroundOpacity));
    root.style.setProperty('--card-radius', c.border.rounded ? c.cornerRadiusPx + 'px' : '0px');

    if(c.border.enabled){
      root.style.setProperty('--card-border-width', c.border.width + 'px');
      root.style.setProperty('--card-border-color', c.border.color);
    } else {
      root.style.setProperty('--card-border-width', '0px');
      root.style.setProperty('--card-border-color', 'transparent');
    }

    const cardEl = document.getElementById('card');
    if(c.blurPx > 0){
      cardEl.style.backdropFilter = `blur(${c.blurPx}px) saturate(130%)`;
      cardEl.style.webkitBackdropFilter = `blur(${c.blurPx}px) saturate(130%)`;
    } else {
      cardEl.style.backdropFilter = 'none';
      cardEl.style.webkitBackdropFilter = 'none';
    }
  }

  function applyMeta(){
    document.title = CONFIG.meta.title || "biolink";
    if(CONFIG.meta.favicon){
      document.querySelector("link[rel='icon']").href = CONFIG.meta.favicon;
    }
    if(CONFIG.meta.description){
      const m = document.createElement('meta');
      m.name = "description";
      m.content = CONFIG.meta.description;
      document.head.appendChild(m);
    }
    if(CONFIG.meta.themeColor){
      const m = document.createElement('meta');
      m.name = "theme-color";
      m.content = CONFIG.meta.themeColor;
      document.head.appendChild(m);
    }
  }

    twitter: '<path d="M22.46 6c-.77.35-1.6.58-2.46.69.88-.53 1.56-1.37 1.88-2.38-.83.5-1.75.85-2.72 1.05A4.13 4.13 0 0 0 16 4c-2.28 0-4.13 1.86-4.13 4.15 0 .32.04.64.1.94C8.28 8.94 5.1 7.22 2.9 4.56c-.36.62-.57 1.35-.57 2.13 0 1.47.74 2.76 1.88 3.53-.7-.02-1.36-.21-1.93-.53v.05c0 2.06 1.45 3.78 3.39 4.17-.36.1-.74.15-1.13.15-.27 0-.54-.03-.8-.08.55 1.71 2.12 2.95 3.99 2.99A8.32 8.32 0 0 1 2 19.07a11.7 11.7 0 0 0 6.34 1.87c7.6 0 11.76-6.3 11.76-11.77 0-.18 0-.36-.01-.53.81-.58 1.5-1.31 2.07-2.14z"/>',

  function iconSVG(type){
    return `<svg viewBox="0 0 24 24">${ICONS[type] || ICONS.link}</svg>`;
  }

  function setupEnterGate(){
    const overlay = document.getElementById('enter-overlay');
    if(!CONFIG.enterGate.enabled){
      overlay.remove();
      startAudioIfNeeded();
      return;
    }
    document.getElementById('enter-name').textContent = CONFIG.enterGate.nameText;
    overlay.querySelector('.enter-hint').textContent = CONFIG.enterGate.hintText;
    overlay.addEventListener('click', function handler(){
      overlay.classList.add('hidden');
      startAudioIfNeeded();
      setTimeout(()=> overlay.remove(), 450);
      overlay.removeEventListener('click', handler);
    }, { once:true });
  }

  function renderIdentity(){
    const p = CONFIG.profile;
    document.getElementById('display-name').textContent = p.displayName;
    document.getElementById('username').textContent = p.username;

    if(p.avatar) document.getElementById('avatar').src = p.avatar;

    if(p.banner){
      document.getElementById('banner-img').src = p.banner;
    } else {
      document.getElementById('banner').style.display = 'none';
      document.getElementById('avatar-wrap').style.marginTop = '22px';
    }

    document.getElementById('status-dot').className = p.status || 'online';

    if(p.bio) document.getElementById('bio').textContent = p.bio;

    const badgeWrap = document.getElementById('badges');
    (p.badges || []).forEach(b=>{
      const img = document.createElement('img');
      img.src = b.icon;
      img.alt = b.label || '';
      img.title = b.label || '';
      badgeWrap.appendChild(img);
    });

    if(p.typewriter && p.typewriter.enabled && p.typewriter.phrases.length){
      runTypewriter(p.typewriter);
    } else {
      document.getElementById('typewriter').style.display = 'none';
    }
  }

  function runTypewriter(cfg){
    const el = document.getElementById('typewriter-text');
    let phraseIndex = 0, charIndex = 0, deleting = false;
    function tick(){
      const phrase = cfg.phrases[phraseIndex];
      if(!deleting){
        charIndex++;
        el.textContent = phrase.slice(0, charIndex);
        if(charIndex === phrase.length){ deleting = true; setTimeout(tick, cfg.pauseMs); return; }
        setTimeout(tick, cfg.speedMs);
      } else {
        charIndex--;
        el.textContent = phrase.slice(0, charIndex);
        if(charIndex === 0){
          deleting = false;
          phraseIndex = (phraseIndex + 1) % cfg.phrases.length;
          setTimeout(tick, cfg.speedMs * 4);
          return;
        }
        setTimeout(tick, cfg.speedMs / 1.6);
      }
    }
    tick();
  }

  /* real cross-visitor view counter */
  function renderStats(){
    const wrap = document.getElementById('stats');
    const order = ['joined','uid'];

    let viewsAdded = false;
    if(CONFIG.viewCounter && CONFIG.viewCounter.enabled){
      const viewsEl = document.createElement('div');
      viewsEl.className = 'stat';
      viewsEl.innerHTML = `<div class="stat-value" id="views-value">—</div><div class="stat-label">${CONFIG.viewCounter.label}</div>`;
      wrap.appendChild(viewsEl);
      viewsAdded = true;
      fetchAndIncrementViews();
    }

    order.forEach(key=>{
      const stat = CONFIG.stats[key];
      if(!stat || !stat.show) return;
      const div = document.createElement('div');
      div.className = 'stat';
      div.innerHTML = `<div class="stat-value">${stat.value}</div><div class="stat-label">${stat.label}</div>`;
      wrap.appendChild(div);
    });

    if(!viewsAdded && !order.some(k => CONFIG.stats[k] && CONFIG.stats[k].show)){
      wrap.style.display = 'none';
    }
  }

  function fetchAndIncrementViews(){
    const v = CONFIG.viewCounter;
    const valueEl = document.getElementById('views-value');

    // only increment once per browser session so refreshing doesn't
    // inflate it — every genuinely new visit/session still adds +1
    const sessionFlag = 'biolink_view_session_' + v.counterKey;
    const alreadyCountedThisSession = sessionStorage.getItem(sessionFlag);

    const endpoint = alreadyCountedThisSession
      ? `${v.apiBase}/get/${v.counterKey}`
      : `${v.apiBase}/hit/${v.counterKey}`;

    fetch(endpoint)
      .then(r => r.json())
      .then(data => {
        const num = data && data.value !== undefined && data.value !== null ? data.value : null;
        if(num !== null){
          valueEl.textContent = formatCount(num);
          sessionStorage.setItem(sessionFlag, '1');
        } else {
          valueEl.textContent = '0';
        }
      })
      .catch(()=>{
        valueEl.textContent = '0';
      });
  }

  function formatCount(n){
    n = parseInt(n, 10);
    if(isNaN(n)) return '0';
    if(n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'm';
    if(n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'k';
    return String(n);
  }

  function renderSocials(){
    const wrap = document.getElementById('socials');
    const items = (CONFIG.socials || []).filter(s => s.url);
    if(!items.length){ wrap.style.display = 'none'; return; }
    items.forEach(s=>{
      const a = document.createElement('a');
      a.className = 'social-btn';
      a.href = s.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = iconSVG(s.type);
      a.setAttribute('aria-label', s.type);
      wrap.appendChild(a);
    });
  }

  function renderLinks(){
    const wrap = document.getElementById('links');
    const items = CONFIG.links || [];
    if(!items.length){ wrap.style.display = 'none'; return; }
    items.forEach(l=>{
      const a = document.createElement('a');
      a.className = 'link-btn';
      a.href = l.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `<svg class="link-icon" viewBox="0 0 24 24">${(ICONS[l.icon]||ICONS.link)}</svg><span>${l.label}</span><svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg>`;
      wrap.appendChild(a);
    });
  }

  function renderDiscordCard(){
    const card = document.getElementById('discord-card');
    if(CONFIG.lanyard && CONFIG.lanyard.enabled && CONFIG.lanyard.discordUserId){
      card.style.display = 'flex';
      fetchLanyard();
      return;
    }
    if(CONFIG.discordCard && CONFIG.discordCard.enabled){
      card.style.display = 'flex';
      document.getElementById('dc-avatar').src = CONFIG.discordCard.avatar;
      document.getElementById('dc-name').textContent = CONFIG.discordCard.name;
      document.getElementById('dc-sub').textContent = CONFIG.discordCard.subtext;
    }
  }

  function fetchLanyard(){
    const id = CONFIG.lanyard.discordUserId;
    fetch(`https://api.lanyard.rest/v1/users/${id}`)
      .then(r => r.json())
      .then(json => {
        if(!json.success) return;
        const d = json.data;
        document.getElementById('status-dot').className = d.discord_status || 'offline';
        document.getElementById('dc-avatar').src =
          `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png`;
        document.getElementById('dc-name').textContent =
          d.discord_user.global_name || d.discord_user.username;

        let sub = 'Online';
        if(d.listening_to_spotify && d.spotify){
          sub = `Listening to ${d.spotify.song} — ${d.spotify.artist}`;
        } else if(d.activities && d.activities.length){
          sub = d.activities[0].name;
        } else if(d.discord_status){
          sub = d.discord_status.charAt(0).toUpperCase() + d.discord_status.slice(1);
        }
        document.getElementById('dc-sub').textContent = sub;
      })
      .catch(()=>{});
  }

  function renderFooter(){
    const f = document.getElementById('footer');
    if(!CONFIG.footer.text){ f.style.display='none'; return; }
    if(CONFIG.footer.linkUrl){
      f.innerHTML = `<a href="${CONFIG.footer.linkUrl}" target="_blank" rel="noopener noreferrer">${CONFIG.footer.text}</a>`;
    } else {
      f.textContent = CONFIG.footer.text;
    }
  }

  function renderBackground(){
    const b = CONFIG.background;
    document.getElementById('bg-layer').style.background = b.fallbackColor;

    if(b.type === 'video' && b.video){
      const vid = document.getElementById('bg-video');
      vid.src = b.video;
      vid.loop = b.videoLoop;
      vid.muted = b.videoMuted;
      vid.style.display = 'block';
    } else if(b.type === 'image' && b.image){
      document.getElementById('bg-image').src = b.image;
      document.getElementById('bg-image').style.display = 'block';
    }

    const overlay = document.getElementById('bg-overlay');
    overlay.style.background = `linear-gradient(180deg, rgba(6,6,8,${b.overlayOpacity*0.5}) 0%, rgba(6,6,8,${b.overlayOpacity*0.8}) 55%, rgba(6,6,8,${Math.min(1,b.overlayOpacity*1.4)}) 100%)`;

    if(b.ambientMotion && b.ambientMotion.enabled){
      const wrap = document.getElementById('bg-media-wrap');
      wrap.style.animation = `ambientDrift ${b.ambientMotion.durationSec}s ease-in-out infinite alternate`;
      const kf = document.createElement('style');
      kf.textContent = `@keyframes ambientDrift{0%{transform:scale(1.04) translate(0,0);}100%{transform:scale(1.1) translate(-1.5%, -1%);}}`;
      document.head.appendChild(kf);
    }

    if(b.parallax && b.parallax.enabled){
      const wrap = document.getElementById('bg-media-wrap');
      const strength = b.parallax.strength;
      window.addEventListener('mousemove', (e)=>{
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        wrap.style.transform = `translate(${-x*strength}px, ${-y*strength}px)`;
      });
      window.addEventListener('deviceorientation', (e)=>{
        if(e.gamma === null) return;
        const x = Math.max(-1, Math.min(1, e.gamma / 30));
        const y = Math.max(-1, Math.min(1, e.beta / 30));
        wrap.style.transform = `translate(${-x*strength}px, ${-y*strength}px)`;
      });
    }
  }

  function setupParticles(){
    const p = CONFIG.particles;
    if(!p.enabled) return;
    const layer = document.getElementById('particle-layer');
    const color = p.color || getComputedStyle(root).getPropertyValue('--accent').trim();
    let lastSpawn = 0;

    function spawn(x, y){
      for(let i=0;i<p.count;i++){
        const el = document.createElement('div');
        el.className = 'particle';
        const size = p.size + Math.random()*2;
        el.style.width = size+'px';
        el.style.height = size+'px';
        el.style.left = (x - size/2)+'px';
        el.style.top = (y - size/2)+'px';
        el.style.background = color;
        layer.appendChild(el);
        const dx = (Math.random()-0.5) * 30;
        const dy = (Math.random()-0.5) * 30 - 10;
        el.animate([
          { transform:'translate(0,0) scale(1)', opacity:0.6 },
          { transform:`translate(${dx}px, ${dy}px) scale(0)`, opacity:0 }
        ], { duration:p.life, easing:'ease-out' });
        setTimeout(()=> el.remove(), p.life);
      }
    }

    window.addEventListener('mousemove', (e)=>{
      const now = performance.now();
      if(now - lastSpawn < 35) return;
      lastSpawn = now;
      spawn(e.clientX, e.clientY);
    });
  }

  function setupAudio(){
    const a = CONFIG.audio;
    if(!a.enabled || !a.url) return;
    const audioEl = document.getElementById('audio-el');
    const bar = document.getElementById('audio-bar');
    audioEl.src = a.url;
    audioEl.volume = a.startVolume;
    bar.style.display = 'flex';

    function setLabel(playing){
      document.getElementById('audio-label').textContent = playing ? a.label.playing : a.label.paused;
      bar.classList.toggle('playing', playing);
    }

    bar.addEventListener('click', ()=>{
      if(audioEl.paused){
        audioEl.play().then(()=>setLabel(true)).catch(()=>{});
      } else {
        audioEl.pause();
        setLabel(false);
      }
    });

    window.__startConfiguredAudio = function(){
      if(a.autoplay){
        audioEl.play().then(()=>setLabel(true)).catch(()=>setLabel(false));
      }
    };
  }

  function startAudioIfNeeded(){
    if(window.__startConfiguredAudio) window.__startConfiguredAudio();
  }

  function init(){
    applyTheme();
    applyCardAppearance();
    applyMeta();
    renderBackground();
    renderIdentity();
    renderStats();
    renderSocials();
    renderLinks();
    renderDiscordCard();
    renderFooter();
    setupParticles();
    setupAudio();
    setupEnterGate();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>forgave.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "DM Mono", "Courier New", monospace;
  color: #fff;
}

#bgvideo {
  display: none;
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

#wordfield {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

#trail {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
}

/* ── Card ── */
#card-stack {
  position: fixed;
  top: 36px;
  left: 40px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  width: 320px;
}

#content {
  position: relative;
  z-index: 10;

  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.10);
  border-radius: 16px;
  padding: 24px 28px 22px 28px;
  box-shadow:
    0 12px 60px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);

  opacity: 0;
  transform: translateY(-14px) scale(0.98);
  animation: cardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  animation-delay: 0.2s;

  display: flex;
  flex-direction: column;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* top shimmer line */
#content::before {
  content: "";
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  border-radius: 999px;
  pointer-events: none;
}

/* ── site name ── */
.site-name {
  font-size: 1.25rem;
  font-weight: 500;
  letter-spacing: -0.3px;
  color: #fff;
  margin-bottom: 5px;
  line-height: 1;
  min-height: 1.25rem;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.55s;
}
.site-name::after {
  content: "|";
  animation: blink .65s step-end infinite;
  margin-left: 1px;
  opacity: 0.5;
}
@keyframes blink { 0%,100%{opacity:.5} 50%{opacity:0} }

/* ── username row ── */
.username-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 20px;
  line-height: 1;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.65s;
}

.username {
  font-size: .72rem;
  color: rgba(255,255,255,.35);
  letter-spacing: .8px;
  position: relative;
  cursor: default;
  display: flex;
  align-items: center;
}
.username:hover { color: rgba(255,255,255,.6); }
.username .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(8,8,8,.97);
  border: 1px solid rgba(255,255,255,.12);
  color: #fff;
  font-size: .6rem;
  font-family: "DM Mono", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 20;
}
.username:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }

.badge {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  cursor: default;
}
.badge svg {
  width: 13px;
  height: 13px;
  color: rgba(255,255,255,.55);
  transition: transform .15s, color .15s;
  display: block;
}
.badge:hover svg { transform: scale(1.2); color: #fff; }
.badge .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(8,8,8,.97);
  border: 1px solid rgba(255,255,255,.12);
  color: #fff;
  font-size: .6rem;
  font-family: "DM Mono", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 20;
}
.badge:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── divider ── */
.divider {
  height: 1px;
  background: rgba(255,255,255,.07);
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.72s;
}

/* ── meta ── */
.meta-label {
  font-size: .68rem;
  font-weight: 500;
  color: rgba(255,255,255,.3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.75s;
}

.meta-line {
  font-size: .76rem;
  color: rgba(255,255,255,.55);
  margin-bottom: 4px;
  line-height: 1.6;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
}
.meta-line:nth-of-type(1) { animation-delay: 0.82s; }
.meta-line:nth-of-type(2) { animation-delay: 0.89s; }
.meta-line:nth-of-type(3) { animation-delay: 0.96s; }
.meta-line:nth-of-type(4) { animation-delay: 1.03s; }

.spacer { height: 16px; }

/* ── icon links ── */
.icon-links {
  display: flex;
  gap: 12px;
  align-items: center;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 1.1s;
}
.icon-link {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,.45);
  transition: color .2s, transform .2s;
  text-decoration: none;
}
.icon-link:hover { color: #fff; transform: scale(1.15); }
.icon-link svg { width: 22px; height: 22px; fill: currentColor; display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Overlay ── */
#overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity .6s ease;
}
#overlay.hide { opacity: 0; pointer-events: none; }
#overlay-text {
  font-family: "DM Mono", monospace;
  font-size: .75rem;
  color: rgba(255,255,255,.25);
  letter-spacing: 3px;
  text-transform: uppercase;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .25; }
  50%       { opacity: .7; }
}
</style>
</head>
<body>

<video id="bgvideo" loop playsinline></video>
<canvas id="wordfield"></canvas>
<canvas id="trail"></canvas>

<div id="overlay">
  <span id="overlay-text">click to enter</span>
</div>

<audio id="audio" loop></audio>

<div id="card-stack">
  <div id="content">
    <div class="site-name" id="site-name"></div>

    <div class="username-row">
      <span class="username">
        handings
        <span class="tip">UID: -1</span>
      </span>
      <div class="badge">
        <svg viewBox="0 0 24 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <polygon points="2,18 4,8 9,13 12,2 15,13 20,8 22,18"/>
          <rect x="2" y="18" width="20" height="2" rx="1"/>
        </svg>
        <span class="tip">owner</span>
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H7a3 3 0 00-3 3v3a3 3 0 01-3 3 3 3 0 013 3v3a3 3 0 003 3h1"/>
          <path d="M16 3h1a3 3 0 013 3v3a3 3 0 003 3 3 3 0 00-3 3v3a3 3 0 01-3 3h-1"/>
        </svg>
        <span class="tip">developer</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="meta-label">last change: <span id="last-change-date"></span></div>

    <div class="meta-line" id="line1"></div>
    <div class="meta-line" id="line2"></div>
    <div class="meta-line" id="line3"></div>
    <div class="meta-line" id="discord-line" style="display:none">discord — <span id="discord-val"></span></div>

    <div class="spacer"></div>
    <div class="icon-links" id="links-container"></div>
  </div>
</div>

<script>
/* ─────────────── CONFIG ─────────────── */
const C = {
  siteName:   "forgave.lol",
  lastChange: "24 May 2026",
  lines: [
    "@factor / on tiktok",
    "discord.gg/factor",
    "join discord via link",
  ],
  discord: "handings (355869591278452746)",
  links: [
    { label: "tiktok",  url: "https://tiktok.com/@factor", icon: "tiktok"  },
    { label: "discord", url: "https://discord.gg/factor",  icon: "discord" },
  ],
  bgVideo: {
    urls: [
      "https://files.catbox.moe/aned1c.mp4"
    ],
    opacity: 0.45,
  },
  bgWords:   ["forgave", "frgv", "</>", "///"],
  wordCount: 26,
  wordSpeed: [1.0, 2.5],
  wordSize:  [9, 28],
  wordSpin:  0.007,
  wordColor: "rgba(180,180,200,",
  music: { url: "", volume: 0.4 },
};
/* ─────────────────────────────────────── */

const ICONS = {
  tiktok: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg>`,
  discord: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`,
};

/* ── apply config ── */
document.getElementById("last-change-date").textContent = C.lastChange;
["line1","line2","line3"].forEach((id, i) => {
  const el = document.getElementById(id);
  if (el) el.textContent = C.lines[i] || "";
});
if (C.discord) {
  document.getElementById("discord-line").style.display = "";
  document.getElementById("discord-val").textContent = C.discord;
}
C.links.forEach(lk => {
  const a = document.createElement("a");
  a.className = "icon-link";
  a.href = lk.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.title = lk.label;
  a.innerHTML = ICONS[lk.icon] || lk.label;
  document.getElementById("links-container").appendChild(a);
});

/* ── typewriter ── */
const nameEl   = document.getElementById("site-name");
const typeText = C.siteName;
let ti = 0, deleting = false;
function typeStep() {
  if (!deleting) {
    nameEl.textContent = typeText.slice(0, ++ti);
    if (ti === typeText.length) { deleting = true; setTimeout(typeStep, 2000); }
    else setTimeout(typeStep, 90);
  } else {
    nameEl.textContent = typeText.slice(0, --ti);
    if (ti === 0) { deleting = false; setTimeout(typeStep, 500); }
    else setTimeout(typeStep, 55);
  }
}
setTimeout(typeStep, 700);

/* ── video setup ── */
const bgvideo  = document.getElementById("bgvideo");
const canvas   = document.getElementById("wordfield");
const ctx      = canvas.getContext("2d");
const hasVideo = C.bgVideo.urls && C.bgVideo.urls.length > 0;

if (hasVideo) {
  const randomUrl = C.bgVideo.urls[Math.floor(Math.random() * C.bgVideo.urls.length)];
  bgvideo.src           = randomUrl;
  bgvideo.style.display = "block";
  bgvideo.style.opacity = C.bgVideo.opacity;
  canvas.style.display  = "none";
}

/* ── overlay click ── */
const audio   = document.getElementById("audio");
const overlay = document.getElementById("overlay");
overlay.addEventListener("click", () => {
  overlay.classList.add("hide");
  setTimeout(() => overlay.remove(), 700);
  if (hasVideo) bgvideo.play().catch(e => console.warn("Video play failed:", e));
  if (C.music.url) {
    audio.src    = C.music.url;
    audio.volume = C.music.volume;
    audio.play().catch(() => {});
  }
});

/* ── falling words ── */
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", () => { resize(); initWords(); });

const words = [];
function randWord() { return C.bgWords[Math.floor(Math.random() * C.bgWords.length)]; }
function makeWord(top) {
  const depth = Math.random();
  const size  = C.wordSize[0]  + depth * (C.wordSize[1]  - C.wordSize[0]);
  const speed = C.wordSpeed[0] + depth * (C.wordSpeed[1] - C.wordSpeed[0]);
  return {
    text: randWord(), x: Math.random() * canvas.width,
    y: top ? -(size * 2 + Math.random() * 80) : Math.random() * canvas.height,
    size, speed, depth,
    rot: (Math.random() - .5) * Math.PI * 2,
    rotSpeed: (Math.random() > .5 ? 1 : -1) * (0.002 + Math.random() * C.wordSpin),
    drift: (Math.random() - .5) * 0.15,
    opacity: 0.03 + depth * 0.20,
  };
}
function initWords() { words.length = 0; for (let i = 0; i < C.wordCount; i++) words.push(makeWord(false)); }
initWords();
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const w of words) {
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(w.rot);
    ctx.font = `300 ${w.size}px "DM Mono","Courier New",monospace`;
    ctx.fillStyle = C.wordColor + w.opacity + ")";
    ctx.fillText(w.text, 0, 0);
    ctx.restore();
    w.y += w.speed; w.x += w.drift; w.rot += w.rotSpeed;
    if (w.y > canvas.height + w.size * 3) { Object.assign(w, makeWord(true)); w.x = Math.random() * canvas.width; }
  }
  requestAnimationFrame(draw);
}
draw();

/* ── ghost cursor trail ── */
const trail = document.getElementById("trail");
const tCtx  = trail.getContext("2d");
trail.width  = window.innerWidth;
trail.height = window.innerHeight;
window.addEventListener("resize", () => { trail.width = window.innerWidth; trail.height = window.innerHeight; });
let mx = window.innerWidth / 2, my = window.innerHeight / 2;
const ghosts = [
  { x: mx, y: my, lag: 0.18, alpha: 0.22, scale: 0.95 },
  { x: mx, y: my, lag: 0.10, alpha: 0.13, scale: 0.90 },
  { x: mx, y: my, lag: 0.06, alpha: 0.07, scale: 0.85 },
];
window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
function drawArrow(x, y, alpha, scale) {
  tCtx.save();
  tCtx.translate(x, y);
  tCtx.scale(scale, scale);
  tCtx.beginPath();
  tCtx.moveTo(0, 0); tCtx.lineTo(0, 16); tCtx.lineTo(3.5, 12.5);
  tCtx.lineTo(6, 18); tCtx.lineTo(8, 17); tCtx.lineTo(5.5, 11.5);
  tCtx.lineTo(10, 11.5); tCtx.closePath();
  tCtx.fillStyle = `rgba(255,255,255,${alpha})`;
  tCtx.fill();
  tCtx.strokeStyle = `rgba(0,0,0,${alpha * 0.5})`;
  tCtx.lineWidth = 0.8;
  tCtx.stroke();
  tCtx.restore();
}
function drawTrail() {
  tCtx.clearRect(0, 0, trail.width, trail.height);
  for (const g of ghosts) {
    g.x += (mx - g.x) * g.lag; g.y += (my - g.y) * g.lag;
    drawArrow(g.x, g.y, g.alpha, g.scale);
  }
  requestAnimationFrame(drawTrail);
}
drawTrail();
</script>
</body>
</html>
